name: CI

on:
  push:
    branches: ['*']
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        otp: ['25', '26', '27']
    steps:
      - uses: actions/checkout@v4

      - uses: erlef/setup-beam@v1
        with:
          otp-version: ${{ matrix.otp }}
          rebar3-version: '3.24'

      - name: Restore dependencies cache
        uses: actions/cache@v4
        with:
          path: _build
          key: ${{ runner.os }}-otp-${{ matrix.otp }}-build-${{ hashFiles('rebar.config') }}
          restore-keys: ${{ runner.os }}-otp-${{ matrix.otp }}-build-

      - name: Compile
        run: rebar3 compile

      - name: Run tests
        run: rebar3 ct

      - name: Run dialyzer
        run: rebar3 dialyzer

      - name: Run xref
        run: rebar3 xref
